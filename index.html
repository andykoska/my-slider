<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/beerslider/dist/BeerSlider.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #fff; }
.beer-slider { width: 100vw; height: 100vh; display: block; }
.beer-slider img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
</style>
</head>
<body>
<div id="slider" class="beer-slider">
  <img src="https://raw.githubusercontent.com/andykoska/my-slider/main/TOPAFTER802x1600.png" alt="After">
  <div class="beer-reveal">
    <img src="https://raw.githubusercontent.com/andykoska/my-slider/main/TOPBEFORE802x1600.png" alt="Before">
  </div>
</div>
<script src="https://unpkg.com/beerslider/dist/BeerSlider.js"></script>
<script>new BeerSlider(document.getElementById('slider'));</script>
</body>
</html>
