<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="https://unpkg.com/beerslider/dist/BeerSlider.css">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            background: #fff; /* Цвет фона, если фото узкое */
        }
        .beer-slider { 
            width: 100%; 
            max-width: 802px; /* Фиксируем ширину под твое фото */
            height: auto;
            aspect-ratio: 802 / 1600; /* Сохраняем пропорции */
        }
        .beer-slider img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .beer-handle:focus { outline: none; }
    </style>
</head>
<body>

    <div id="slider" class="beer-slider">
        <img src="TOPBEFORE802x1600.png" alt="Before">
        <div class="beer-reveal">
            <img src="TOPAFTER802x1600.png" alt="After">
        </div>
    </div>

    <script src="https://unpkg.com/beerslider/dist/BeerSlider.js"></script>
    <script>
        new BeerSlider(document.getElementById('slider'), {start: 50});
    </script>
</body>
</html>
