<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="https://unpkg.com/beerslider/dist/BeerSlider.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .beer-slider { width: 100vw; height: 100vh; }
        /* Убираем синюю обводку при клике */
        .beer-handle:focus { outline: none; }
    </style>
</head>
<body>

    <div id="slider" class="beer-slider">
        <img src="TOPBEFORE802x1600.png" alt="Before">
        <div class="beer-reveal">
            <img src="TOPAFTER802x1600.png" alt="After">
        </div>
    </div>

    <script src="https://unpkg.com/beerslider/dist/BeerSlider.js"></script>
    <script>
        new BeerSlider(document.getElementById('slider'));
    </script>
</body>
</html>
